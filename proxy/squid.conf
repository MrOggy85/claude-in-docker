# Shared egress proxy for claude-in-docker. Explicit forward proxy: each
# container points HTTPS_PROXY here with its project key as the username.
# Filtering is on the CONNECT host only — no TLS interception, no CA, so client
# cert-pinning is unaffected. See docs/egress-proxy.md.

http_port 3128

# --- Auth: the username carries the project key. ---------------------------
# auth-ok.sh accepts any credentials; the username is a self-asserted project
# tag selecting the allowlist. A container could borrow another key (accepted
# trade-off, see docs/egress-proxy.md).
auth_param basic program /etc/squid/auth-ok.sh
auth_param basic children 5
auth_param basic realm claude-egress
auth_param basic credentialsttl 24 hours
acl authenticated proxy_auth REQUIRED

# --- Per-project allowlist via external helper. ----------------------------
# Helper returns OK when <host> is in the baseline or project allowlist. ttl=30
# caches verdicts so list edits apply within 30s without a restart.
external_acl_type projacl ttl=30 children-max=20 %LOGIN %DST /etc/squid/ext-allowlist.sh
acl allowed_host external projacl

# --- Method / port hygiene. ------------------------------------------------
acl SSL_ports port 443
acl Safe_ports port 80 443
acl CONNECT method CONNECT
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

# Auth first (populates %LOGIN), then the allowlist; fall-through is denied.
http_access deny !authenticated
http_access allow allowed_host
http_access deny all

# --- Hardening / hygiene. --------------------------------------------------
# Don't advertise the proxy or leak the client to upstreams.
via off
forwarded_for delete
httpd_suppress_version_string on
cache deny all                     # policy gateway, not a cache
# Log to a file, not /dev/stdout: squid reopens the path after dropping to the
# 'proxy' user, but the container's stdout pipe is root-owned. Watch with:
#   docker exec claude-egress-proxy tail -f /var/log/squid/access.log
access_log /var/log/squid/access.log
