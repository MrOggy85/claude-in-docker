# Centralized egress proxy for claude-in-docker.
#
# Explicit forward proxy: each Claude container points HTTPS_PROXY here, carrying
# its project key as the proxy username. Filtering is on the CONNECT target host
# only — no TLS interception, no CA certificate, so client cert-pinning is
# unaffected. See docs/egress-proxy.md for the full design.

http_port 3128

# --- Authentication: the username carries the project key. ----------------
# auth-ok.sh accepts any credentials — the password is not verified. The
# username is a self-asserted project tag that selects the allowlist; a
# container could borrow another project's key (accepted trade-off, see
# docs/egress-proxy.md).
auth_param basic program /etc/squid/auth-ok.sh
auth_param basic children 5
auth_param basic realm claude-egress
auth_param basic credentialsttl 24 hours
acl authenticated proxy_auth REQUIRED

# --- Per-project allowlist via external helper. ----------------------------
# Squid hands the helper "<project-key> <host>"; it returns OK when <host> is in
# the baseline list (the active allowed-domains.txt mounted by up.sh) or in that
# project's projects/<key>/allowed-domains.txt. ttl=30 caches a verdict so list
# edits take effect within 30s without a Squid restart.
external_acl_type projacl ttl=30 children-max=20 %LOGIN %DST /etc/squid/ext-allowlist.sh
acl allowed_host external projacl

# --- Method / port hygiene. ------------------------------------------------
acl SSL_ports port 443
acl Safe_ports port 80 443
acl CONNECT method CONNECT
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

# Force auth first (populates %LOGIN), then the per-project allowlist. Anything
# that falls through is denied — default-deny.
http_access deny !authenticated
http_access allow allowed_host
http_access deny all

# --- Hardening / hygiene. --------------------------------------------------
# Don't advertise the proxy or leak the client to upstreams.
via off
forwarded_for delete
httpd_suppress_version_string on
# Policy gateway, not a cache.
cache deny all
# Log to files under /var/log/squid (writable by the 'proxy' user squid drops
# to). Writing to /dev/stdout fails here: squid reopens the path AFTER dropping
# privileges, and the container's stdout pipe is owned by root. Watch the
# allow/deny stream with:
#   docker exec claude-egress-proxy tail -f /var/log/squid/access.log
access_log /var/log/squid/access.log
